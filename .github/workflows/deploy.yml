name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

concurrency:
  group: production
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          timeout:  600s
          script: |
            bash /opt/dinlink/scripts/deploy.sh

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy to production failed. Check VPS logs: journalctl -u dinlink -n 50"
